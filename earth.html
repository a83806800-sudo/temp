<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Earth Environment</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <!-- Look at text -->
  <script src="https://unpkg.com/aframe-look-at-component@1.0.0/dist/aframe-look-at-component.min.js"></script>

  <!-- OBJ / MTL loader (VERY IMPORTANT) -->
  <script src="https://unpkg.com/aframe-obj-model-component@1.0.0/dist/aframe-obj-model-component.min.js"></script>
</head>
<body>
<a-scene background="color: #87CEEB">

  <!-- ASSETS -->
  <a-assets timeout="30000">
    <a-asset-item id="model-obj" src="models/tinker.obj"></a-asset-item>
    <a-asset-item id="model-mtl" src="models/obj.mtl"></a-asset-item>
  </a-assets>

  <!-- PLAYER RIG -->
  <a-entity id="rig" position="0 0 5">
    <a-entity id="cam" camera position="0 1.6 0" look-controls></a-entity>

    <a-entity id="leftController"
      meta-touch-controls="hand: left"
      laser-controls="hand: left"
      raycaster="objects: .clickable; far: 20"
      line="color: cyan"></a-entity>

    <a-entity id="rightController"
      meta-touch-controls="hand: right"
      laser-controls="hand: right"
      raycaster="objects: .clickable; far: 20"
      line="color: magenta"></a-entity>
  </a-entity>

  <!-- SKY -->
  <a-sky color="#87CEEB"></a-sky>

  <!-- LIGHTS -->
  <a-entity light="type: ambient; intensity: 1.3"></a-entity>
  <a-entity light="type: directional; intensity: 1.2" position="2 6 3"></a-entity>
  <a-entity light="type: point; intensity: 0.8; distance: 30" position="0 5 -5"></a-entity>

  <!-- GROUND -->
  <a-plane position="0 0 -10" rotation="-90 0 0" width="120" height="120" color="#565857"></a-plane>

  <!-- TITLE -->
  <a-text value="EARTH ENVIRONMENT"
          position="0 4 -6"
          align="center"
          color="white"
          width="12"
          side="double"
          look-at="#cam"></a-text>

  <!-- BACK BUTTON -->
  <a-box id="backButton"
         class="clickable"
         position="0 1 -4"
         depth="0.5"
         height="1"
         width="4"
         color="blue"></a-box>

  <a-text value="BACK TO SOLAR"
          position="0 2 -4"
          align="center"
          color="white"
          width="8"
          side="double"
          look-at="#cam"></a-text>

  <!-- 3D MODEL -->
  <a-entity id="earthModel"
    obj-model="obj: #model-obj; mtl: #model-mtl"
    position="0 0 -8"
    rotation="0 180 0"
    scale="0.02 0.02 0.02"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
  </a-entity>

</a-scene>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const rig = document.querySelector('#rig');
  const leftController = document.querySelector('#leftController');
  const rightController = document.querySelector('#rightController');
  const backButton = document.querySelector('#backButton');

  let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;

  function handleThumbstick(evt) {
    if (evt.detail.y < -0.5) { moveForward = true; moveBackward = false; }
    else if (evt.detail.y > 0.5) { moveBackward = true; moveForward = false; }
    else { moveForward = false; moveBackward = false; }

    moveLeft = evt.detail.x < -0.5;
    moveRight = evt.detail.x > 0.5;
  }

  leftController.addEventListener('thumbstickmoved', handleThumbstick);
  rightController.addEventListener('thumbstickmoved', handleThumbstick);

  AFRAME.registerComponent('move-player', {
    tick: function () {
      let pos = rig.getAttribute('position');
      if (moveForward) pos.z -= 0.05;
      if (moveBackward) pos.z += 0.05;
      if (moveLeft) pos.x -= 0.05;
      if (moveRight) pos.x += 0.05;
      rig.setAttribute('position', pos);
    }
  });

  document.querySelector('a-scene').setAttribute('move-player', '');

  backButton.addEventListener('click', function () {
    window.location.href = "index.html";
  });

  // MODEL LOAD DEBUG
  const model = document.querySelector('#earthModel');

  model.addEventListener('model-loaded', function () {
    console.log("✅ 3D model loaded successfully");
  });

  model.addEventListener('model-error', function (e) {
    console.error("❌ Model failed to load", e);
  });
});
</script>
</body>
</html>
